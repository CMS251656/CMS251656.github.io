<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次元审美调查 · 问卷</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 二次元审美与心理需求调查</h1>
            <p class="description">您好！本问卷数据会存入腾讯文档云端，匿名填写，感谢参与！</p>
        </header>

        <form id="surveyForm">
            <!-- 基本信息 -->
            <fieldset>
                <legend>📋 基本信息</legend>
                <div class="form-group">
                    <label>您的性别：</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> 男</label>
                        <label><input type="radio" name="gender" value="female" required> 女</label>
                        <label><input type="radio" name="gender" value="other" required> 其他</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>您的年龄段：</label>
                    <select name="age" required>
                        <option value="">请选择</option>
                        <option value="18岁以下">18岁以下</option>
                        <option value="18-22">18-22岁</option>
                        <option value="23-28">23-28岁</option>
                        <option value="29-35">29-35岁</option>
                        <option value="35岁以上">35岁以上</option>
                    </select>
                </div>
            </fieldset>

            <!-- 量表题（只保留题目，省略具体代码以节省空间，但你要保留你原来的全部15道题） -->
            <!-- ... 你的15道题保持不变 ... -->

            <button type="submit" class="submit-btn">📤 提交问卷</button>
        </form>

        <div style="text-align: center; margin-top: 20px; color: #7f8c8d;">
            📊 数据实时同步至腾讯文档 · <a href="result.html" target="_blank">查看提交结果</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
