<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 实时统计看板 · +++审美调查</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background: linear-gradient(145deg, #fff9fb 0%, #ffeef2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .dashboard {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(255, 150, 180, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px 30px;
            background: rgba(255, 240, 245, 0.6);
            border-radius: 40px;
        }
        .title-section h1 {
            font-size: 2.2rem;
            background: linear-gradient(145deg, #b15c7c, #d46b8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 5px 0;
        }
        .count-card {
            background: linear-gradient(135deg, #ffb6c1, #ff9eb5);
            border-radius: 60px;
            padding: 15px 35px;
            text-align: center;
            box-shadow: 0 15px 25px #ffc0cb80;
        }
        .count-number {
            font-size: 3.2rem;
            font-weight: 800;
            color: white;
            line-height: 1;
        }
        .chart-box {
            background: white;
            border-radius: 40px;
            padding: 30px 20px;
            margin: 20px 0;
            box-shadow: 0 15px 30px #ffdbe4;
        }
        #mainChart {
            width: 100%;
            height: 420px;
        }
        .fake-note {
            text-align: center;
            color: #ba8b9a;
            font-size: 0.9rem;
            margin: 25px 0;
            padding: 12px;
            background: #fff6f9;
            border-radius: 50px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 14px 40px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-pink {
            background: linear-gradient(145deg, #ffb6c1, #ff95ad);
            color: white;
        }
        .btn-white {
            background: white;
            color: #b55b7c;
            border: 2px solid #ffb6c1;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header-stats">
        <div class="title-section">
            <h1>✨ 母性萌妹 · 实时看板</h1>
            <p>数据模拟 · 每日自动校准</p>
        </div>
        <div class="count-card">
            <div class="count-number" id="totalDisplay">102</div>
            <div style="color:white; font-size:0.9rem;">当前样本量</div>
        </div>
    </div>

    <div class="chart-box">
        <div id="mainChart"></div>
    </div>

    <div class="fake-note">
        📆 样本每日刷新 · 当前数据基于社会模拟
    </div>

    <div class="action-buttons">
        <a href="index.html" class="btn btn-white">⬅ 继续填写</a>
        <button class="btn btn-pink" onclick="forceRefresh()">🔄 手动刷新</button>
    </div>
</div>

<script>
    (function() {
        // 伪造数据（符合社会现状）
        const BASE_MEANS = [4.6, 4.3, 3.2, 4.5, 3.9, 2.6, 4.2];
        const dimNames = ['母性关怀', '幼态审美', '低社交压力', '掌控感', '孤独补偿', '责任规避', '整体喜爱度'];

        // 总人数管理（存在localStorage里，每日自动加随机数）
        function getFakeTotal() {
            const KEY = 'fake_total';
            const DATE_KEY = 'fake_date';
            const today = new Date().toDateString();
            let saved = localStorage.getItem(KEY);
            let lastDate = localStorage.getItem(DATE_KEY);

            if (!saved || lastDate !== today) {
                let base = saved ? parseInt(saved) : 102;
                let increment = Math.floor(Math.random() * 5) + 1;
                let newTotal = base + increment;
                localStorage.setItem(KEY, newTotal);
                localStorage.setItem(DATE_KEY, today);
                return newTotal;
            }
            return parseInt(saved);
        }

        document.getElementById('totalDisplay').innerText = getFakeTotal();

        // 初始化图表
        let chartDom = document.getElementById('mainChart');
        let myChart = echarts.init(chartDom);

        let option = {
            grid: { left: '8%', right: '5%', bottom: '10%', top: '10%' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            xAxis: {
                type: 'category',
                data: dimNames,
                axisLabel: { color: '#a67c8a', rotate: 15 }
            },
            yAxis: {
                type: 'value',
                min: 0,
                max: 5,
                splitLine: { lineStyle: { color: '#ffe2ed' } }
            },
            series: [{
                name: '平均分',
                type: 'bar',
                data: [0,0,0,0,0,0,0],
                itemStyle: {
                    color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: '#ff99aa' },
                            { offset: 1, color: '#ffc0cb' }
                        ]
                    },
                    borderRadius: [10,10,0,0]
                },
                barWidth: 32,
                label: { show: true, position: 'top', color: '#b34e72' }
            }]
        };
        myChart.setOption(option);

        // 动画：柱子从0涨到目标值
        function animateBars() {
            let steps = 30;
            let step = 0;
            let timer = setInterval(() => {
                step++;
                let progress = Math.min(1, step / steps);
                let newData = BASE_MEANS.map(v => v * progress);
                myChart.setOption({ series: [{ data: newData }] });
                if (progress >= 1) clearInterval(timer);
            }, 50);
        }
        window.addEventListener('load', () => setTimeout(animateBars, 200));

        // 手动刷新：总人数+1~5，重播动画
        window.forceRefresh = function() {
            let current = parseInt(localStorage.getItem('fake_total') || '102');
            let increment = Math.floor(Math.random() * 5) + 1;
            localStorage.setItem('fake_total', current + increment);
            localStorage.setItem('fake_date', new Date().toDateString());
            document.getElementById('totalDisplay').innerText = current + increment;
            myChart.setOption({ series: [{ data: [0,0,0,0,0,0,0] }] });
            animateBars();
        };
    })();
</script>
</body>
</html>
