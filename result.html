<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255,150,200,0.2);
            max-width: 500px;
            margin: 50px auto;
        }
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            color: #a65a7a;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.2em;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ffb6c1, #ff99aa);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255,150,200,0.5);
        }
        .note {
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-container">
            <div class="success-icon">✅</div>
            <h1>提交成功！</h1>
            <p>感谢您的参与，数据已提交至腾讯文档。</p>
            <a href="index.html" class="btn">填写新问卷</a>
            <div class="note">
                <p>📌 提示：如果你没有跳转到腾讯文档，<br>请手动点击下方链接填写：</p>
                <a href="https://docs.qq.com/form/page/DY3ppeFpNeG1rT1dV" target="_blank" style="color: #ff99aa;">→ 点此前往腾讯文档 ←</a>
            </div>
        </div>
    </div>
</body>
</html>
